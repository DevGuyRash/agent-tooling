name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Consider using a PAT if you need downstream workflows to trigger on release PRs/tags.
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: simple
