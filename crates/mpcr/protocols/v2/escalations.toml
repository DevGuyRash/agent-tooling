[[policy]]
id = "security-escalation"
version = "2026.03.08"
summary = "Escalate when routed security posture is insufficient for newly discovered high-risk surfaces."
must = ["tie escalation to concrete auth, privilege, privacy, or exploit evidence"]
must_not = ["escalate on vague unease"]
inputs = ["route_revision", "child_findings"]
outputs = ["heldback escalation activation"]
checks = ["security risk is evidence-backed"]
stop_when = ["security escalation is either activated or dismissed"]
escalate_when = ["new high-weight security surface appears"]
anti_patterns = ["security escalation without path evidence"]
examples = ["New privilege-boundary bypass found mid-review."]
schema = ["escalation_id", "trigger evidence", "resulting route change"]

[[policy]]
id = "reopen"
version = "2026.03.08"
summary = "Escalate a full-cycle reopen only when severity-bounded rules or staleness rules require it."
must = ["reopen only for blocker, major, behavior staleness, verification failure, or fix regression", "reopen only when the unresolved claim still survives both the introducing condition check and the downstream effect or closure path after application and verification"]
must_not = ["reopen for minor or nit alone"]
inputs = ["convergence_state", "verification_result", "parent_review"]
outputs = ["reopen_triggers"]
checks = ["reason codes are categorical", "severity floor remains major", "reopen reasons still survive introduction-side and closure-side challenge instead of repeating a claim already neutralized downstream"]
stop_when = ["reopen decision is finalized"]
escalate_when = ["allowed trigger is present"]
anti_patterns = ["open-ended retries"]
examples = ["Behavior-facing staleness remains after application."]
schema = ["reopen_reason_code", "reference_id", "next_route_inputs"]

[[policy]]
id = "malformed-output"
version = "2026.03.08"
summary = "Escalate when hard validation or machine-structure expectations fail."
must = ["retry with examples only after malformed output or hard validation failure"]
must_not = ["treat soft warnings as malformed output"]
inputs = ["hard validation errors", "retry state"]
outputs = ["retry decision"]
checks = ["examples view loaded only when allowed"]
stop_when = ["artifact becomes valid or retry budget is exhausted"]
escalate_when = ["first hard validation failure occurs"]
anti_patterns = ["retrying on style polish alone"]
examples = ["Child artifact missing fingerprint field."]
schema = ["escalation_id", "error set", "retry guidance"]

[[policy]]
id = "scope-creep"
version = "2026.03.08"
summary = "Escalate when the routed change scope materially exceeds the requested or justified scope."
must = ["tie scope escalation to concrete route evidence", "prefer simplification-checker before escalation when bounded"]
must_not = ["escalate for harmless cleanup"]
inputs = ["route_decision", "scope signals", "child findings"]
outputs = ["heldback escalation activation"]
checks = ["scope evidence is specific"]
stop_when = ["scope-creep risk is either captured or dismissed"]
escalate_when = ["scope exceeds justified change envelope"]
anti_patterns = ["taste-based escalation"]
examples = ["Large unrelated subsystem rewrite inside a one-file bug fix."]
schema = ["escalation_id", "trigger evidence", "resulting guidance"]
