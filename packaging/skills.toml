# Single source of truth for packaged plugin-local skill binaries.
# Add one [skills.<id>] entry per packaged launcher/binary pair.
# Repo scripts and CI both consume required_platforms/ci_platforms from this manifest.
# Current repo policy: Linux payloads are pre-packaged and committed.
# Other operating systems should build from source inside the target clone.

[skills.code_review]
package = "mpcr"
binary = "mpcr"
skill_dir = "plugins/code-review/skills/code-review"
launcher = "scripts/mpcr"
smoke_args = ["--help"]
required_platforms = ["linux-x86_64"]
ci_platforms = ["linux-x86_64"]

[skills.docker_architect_compose]
package = "docker-architect-compose"
binary = "docker-architect-compose"
skill_dir = "plugins/docker-architect/skills/docker-architect"
launcher = "scripts/docker-architect-compose"
smoke_args = ["--help"]
required_platforms = ["linux-x86_64"]
ci_platforms = ["linux-x86_64"]

[skills.docker_architect_image]
package = "docker-architect-image"
binary = "docker-architect-image"
skill_dir = "plugins/docker-architect/skills/docker-architect"
launcher = "scripts/docker-architect-image"
smoke_args = ["--help"]
required_platforms = ["linux-x86_64"]
ci_platforms = ["linux-x86_64"]

[skills.friction_render_table]
package = "render-table"
binary = "render-table"
skill_dir = "plugins/friction-diagnostics/skills/friction-diagnostics"
launcher = "scripts/render-table.sh"
smoke_args = ["--help"]
required_platforms = ["linux-x86_64"]
ci_platforms = ["linux-x86_64"]
