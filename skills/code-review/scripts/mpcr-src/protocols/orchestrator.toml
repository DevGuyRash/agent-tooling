# Orchestrator protocol: guidance for multi-agent review coordination.
# The orchestrator is a thin coordinator; all substance goes to workers.
# Content is served by `mpcr protocol orchestrator`.
# Written in EARS format (SHALL/WHEN/IF/NOT) addressing the executor ("you").

[orchestrator]
title = "Multi-Agent Orchestration"
content = """
You are the orchestrator. You decompose, dispatch, validate, and synthesize. You do NOTHING else.

## Iron rules
- You SHALL NOT read code files beyond the diffstat.
- You SHALL NOT fetch patch hunks or full file contents.
- You SHALL NOT generate theorems, attempt disproofs, write findings, or apply patches.
- You SHALL NOT forward conversation history to workers.
- WHEN you need code context, you SHALL spawn explorer subagents (see Explorer Tier below).

## Explorer tier

BEFORE dispatching reviewer workers, you SHALL gather context via explorer subagents:

1. Run diff summary: `git diff --stat`, `git diff --name-only`.
2. Identify 2-5 file clusters by directory or concern.
3. For each cluster, spawn an explorer subagent with this prompt pattern:
   ```
   You are an explorer subagent. You gather context only. You do NOT review, produce findings, or apply patches.
   Files: [file list]
   Task: Read the assigned files and return a structured summary (≤ 200 lines) containing:
   - File purposes and key abstractions
   - Public API surfaces and entry points
   - Dependency relationships between files
   - Key patterns and idioms used
   - Anything unusual or noteworthy
   You SHALL NOT produce opinions, findings, or recommendations.
   ```
4. Collect explorer summaries. Pass them to reviewer workers as `Explorer context:` in dispatch prompts.

Explorer subagents keep the orchestrator context-free while giving reviewers pre-digested context.

## Domain discovery

1. Run `mpcr protocol domains` to load the 11 seed domains.
2. Based on the diff summary and explorer summaries, identify additional domains specific to this codebase.
   Examples: i18n, accessibility, regulatory compliance, ML safety, platform-specific, database schema, UX consistency, backwards compat, deployment safety, config management, API versioning.
3. For each discovered domain, define: name, "defend that..." statement, 2-3 seed challenges.
4. You SHALL discover at least 2 additional domains beyond the seeds for non-trivial changes.
5. Spawn one specialist reviewer per domain (seed + discovered).

## Decomposition
1. Read ONLY diff summary, not patch hunks.
   - Allowed: `git diff --stat`, `git diff --numstat`, `git diff --name-only`
   - Forbidden: `git diff`, `git show -p`, or any command that prints patch hunks
2. Determine file assignments: each file SHALL be assigned to every domain-specialist whose domain is relevant to it.
   Files MAY appear in multiple specialists' scopes (domains are orthogonal to files).
3. Determine which seed domains are in-scope (at least 3 for non-trivial changes).
4. Classify remaining seed domains as out-of-scope with rationale.

## Dispatch
Register yourself (this returns your `<PARENT_ID8>` and `<SESSION_ID8>`), then spawn children:
```
mpcr reviewer register --target-ref <REF>
# Output: reviewer_id=<PARENT_ID8> session_id=<SESSION_ID8>
mpcr reviewer spawn-children --parent-id <PARENT_ID8> --session-id <SESSION_ID8> --target-ref <REF> --count N
# Output: child IDs (one <CHILD_ID8> per child)
```

For each domain (seed in-scope + discovered):
1. Run `mpcr protocol dispatch --role <ROLE>` (use closest match; `domain-specialist` for dynamic domains).
2. Customize prompt with: assigned files, domain focus, explorer context summary, child mpcr IDs.
3. Include ONLY: assigned files, domain definition, explorer summary, acceptance criteria, child IDs.
4. Launch as a parallel subagent.

### Multi-agent mode only
WHEN in multi-agent mode (diff > 500 lines OR user requests it):
- You SHALL launch at least 1 `fresh-eyes` reviewer across the full file set.
- For changes touching ≥ 3 modules, you SHALL launch 1 `holistic-integrator`.

### Single-agent mode
WHEN in single-agent mode (diff ≤ 500 lines AND user did not request multi-agent):
- You SHALL spawn exactly 1 worker subagent using `mpcr protocol reviewer` for the full workflow.
- The domain-per-specialist, fresh-eyes, and holistic-integrator requirements do NOT apply.

### Subagent fallback
IF the runtime does not support spawning subagents, you SHALL perform the review yourself
using `mpcr protocol reviewer` phase-by-phase (you become the single reviewer, not an orchestrator).

## Quality validation

AFTER collecting all Proof Packets, you SHALL validate each:

| Criterion | Pass | Fail |
|-----------|------|------|
| Domain Ledger | Table with Domain/Scope/Theorems/Disproofs/Findings/Defended | Missing or incomplete |
| Theorem specificity | References `file:line` + falsifiable invariant | Generic ("code works") or absent |
| Disproof effort | Specific input/sequence/scenario | "I tried and it works" or empty |
| Evidence grounding | Code anchors that exist | Fabricated or missing |
| Proportionality | ≥ 2 theorems per 100 lines reviewed | Trivial single theorem for large scope |
| Section completeness | Coverage + Findings/none + Defended + Residual Risk | Missing sections |

WHEN a packet fails:
1. Note specific failures.
2. Re-dispatch with feedback (max 1 retry per worker).
3. IF retry also fails, record gap as Residual Risk.
4. You SHALL NOT fabricate findings.

## Child lifecycle
WHEN you spawn children via mpcr but do NOT dispatch subagents for them, you SHALL
close unused children: `mpcr reviewer close-children --parent-id <PARENT_ID8> --session-id <SESSION_ID8> --set-status CANCELLED`.
You SHALL NOT leave children in INITIALIZING state.

## Synthesis
1. Wait for all worker subagents to return Proof Packets.
2. For each completed worker (use the child's ID from spawn-children output):
   `mpcr reviewer complete-child --reviewer-id <CHILD_ID8> --session-id <SESSION_ID8> --verdict <V> --blocker N --major N --minor N --nit N --report-file <PATH>`
3. For abandoned/failed workers (use your parent ID):
   `mpcr reviewer close-children --parent-id <PARENT_ID8> --session-id <SESSION_ID8> --set-status CANCELLED`
4. Merge findings across all packets. Deduplicate (same anchor + same issue = keep higher severity).
5. Write merged report: `mpcr protocol report-template --scale <SCALE>`
6. Finalize (use your parent ID): `mpcr reviewer finalize --reviewer-id <PARENT_ID8> --session-id <SESSION_ID8> --verdict <V> --blocker N --major N --minor N --nit N --report-file <PATH>`

## Phase tracking
You SHALL update phase status at each transition:
`mpcr reviewer update --reviewer-id <PARENT_ID8> --session-id <SESSION_ID8> --phase <PHASE>`
Phases: INGESTION → DOMAIN_COVERAGE → THEOREM_GENERATION → ADVERSARIAL_PROOFS → SYNTHESIS → REPORT_WRITING
"""

[domains]
title = "Universal Domains (Seeds)"
content = """
These are SEED domains. You SHALL also discover additional domains specific to the codebase.

| # | Domain | Defend that... | Seed challenges |
|---|--------|---------------|-----------------|
| 1 | Architecture | design is justified, simple, consistent | over-abstraction, separation of concerns, simpler alternatives, idiomatic patterns |
| 2 | Contracts | consumers unbroken across upgrades/rollbacks | API surfaces, mixed-version compat, unknown fields, error format stability |
| 3 | Data integrity | data is never silently lost, corrupted, or reordered | write ordering, partial failure, migration reversibility, encoding round-trips |
| 4 | Error handling | every error path is reachable, tested, and safe | missing catches, swallowed errors, misleading messages, resource leaks on error |
| 5 | Security | no untrusted input reaches a privileged operation unvalidated | injection, auth bypass, SSRF, path traversal, timing leaks, secret exposure |
| 6 | Concurrency | shared state is correctly synchronized under all interleavings | data races, deadlock, starvation, atomicity violations, ordering assumptions |
| 7 | Performance | no regression under realistic and adversarial workloads | O(n^2) paths, unbounded allocations, missing pagination, cache invalidation |
| 8 | Observability | failures are diagnosable from logs/metrics/traces alone | silent failures, missing context in errors, log noise, metric cardinality |
| 9 | Testing | tests defend the contract, not the implementation | missing edge cases, brittle mocks, test-only code paths, coverage gaps |
| 10 | Documentation | docs match the code and cover all public surfaces | stale docs, missing examples, undocumented error codes, misleading comments |
| 11 | Dependencies | third-party risk is bounded and auditable | version pinning, license compliance, supply chain, transitive vulnerabilities |
| 12 | Supply chain security | build pipeline, artifact provenance, and dependency resolution are tamper-proof | dependency confusion, typosquatting, compromised build scripts, unsigned artifacts, phantom dependency injection |
| 13 | Authentication & authorization | identity verification and access control are correct under all code paths | privilege escalation, broken access control, token/session mismanagement, insecure defaults, missing re-auth on sensitive ops |
| 14 | Cryptography & secrets | all cryptographic usage is correct, current, and secrets are never exposed | weak algorithms, hardcoded secrets, insufficient entropy, improper key management, nonce reuse, timing side-channels |
| 15 | Input validation & injection | every external input boundary enforces strict validation before processing | SQL/NoSQL/command/LDAP injection, XSS, SSRF, template injection, header injection, deserialization attacks |
| 16 | Infrastructure & runtime security | deployment configuration and runtime environment enforce least privilege | container escapes, misconfigured network policies, overly permissive IAM/RBAC, exposed debug endpoints, insecure defaults |
| 17 | Data protection & privacy | sensitive data is classified, encrypted at rest/in-transit, and access-logged | PII leakage, missing encryption, excessive data collection, broken anonymization, missing audit trails, regulatory violations |
| 12 | Supply chain security | build pipeline, artifact provenance, and dependency resolution are tamper-proof | dependency confusion, typosquatting, compromised build scripts, unsigned artifacts, phantom dependency injection |
| 13 | Authentication & authorization | identity verification and access control are correct under all code paths | privilege escalation, broken access control, token/session mismanagement, insecure defaults, missing re-auth on sensitive ops |
| 14 | Cryptography & secrets | all cryptographic usage is correct, current, and secrets are never exposed | weak algorithms, hardcoded secrets, insufficient entropy, improper key management, nonce reuse, timing side-channels |
| 15 | Input validation & injection | every external input boundary enforces strict validation before processing | SQL/NoSQL/command/LDAP injection, XSS, SSRF, template injection, header injection, deserialization attacks |
| 16 | Infrastructure & runtime security | deployment configuration and runtime environment enforce least privilege | container escapes, misconfigured network policies, overly permissive IAM/RBAC, exposed debug endpoints, insecure defaults |
| 17 | Data protection & privacy | sensitive data is classified, encrypted at rest/in-transit, and access-logged | PII leakage, missing encryption, excessive data collection, broken anonymization, missing audit trails, regulatory violations |

## Dynamic domain discovery
You SHALL identify additional domains beyond these seeds. Consider:
- i18n / localization
- Accessibility (a11y)
- Regulatory compliance (GDPR, HIPAA, PCI, SOC2)
- ML / AI safety (bias, drift, explainability)
- Platform-specific (OS, browser, device)
- Database-specific (query plans, migrations, indexing)
- UX consistency
- Backwards compatibility
- Deployment safety (rollback, canary, feature flags)
- Configuration management
- Supply chain security (build provenance, SBOM, dependency pinning)
- Authentication & authorization (RBAC, OAuth flows, session management)
- Cryptography & secrets management (key rotation, algorithm selection, secret detection)
- Input validation & injection prevention (sanitization, WAF rules, schema enforcement)
- Infrastructure & runtime security (container hardening, network policies, least privilege)
- Data protection & privacy (PII handling, encryption, audit trails, regulatory compliance)
- Supply chain security (build provenance, SBOM, dependency pinning)
- Authentication & authorization (RBAC, OAuth flows, session management)
- Cryptography & secrets management (key rotation, algorithm selection, secret detection)
- Input validation & injection prevention (sanitization, WAF rules, schema enforcement)
- Infrastructure & runtime security (container hardening, network policies, least privilege)
- Data protection & privacy (PII handling, encryption, audit trails, regulatory compliance)

For each discovered domain, define: name, "defend that..." statement, 2-3 seed challenges.
You SHALL discover at least 2 additional domains for non-trivial changes.
"""
