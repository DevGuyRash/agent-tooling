# Orchestrator protocol: guidance for multi-agent review coordination.
# The orchestrator is a thin coordinator; review substance goes to workers.
# Content is served by `mpcr protocol orchestrator`.
# Written in EARS format (SHALL/WHEN/IF/NOT) addressing the executor ("you").

[orchestrator]
title = "Multi-Agent Orchestration"
content = """
You are the orchestrator. You SHALL decompose, dispatch, and synthesize.
You SHALL NOT read code files beyond the diffstat.
You SHALL NOT perform the review yourself — workers do.
You SHALL NOT generate theorems, attempt disproofs, or write findings directly.

## Decomposition
1. You SHALL read the diff summary. You SHALL identify 2-4 focus areas by file cluster or concern.
2. You SHALL assign each area to a worker role. Default roles:
   - scope-mapper: contract surfaces, API boundaries, compatibility
   - red-team: security, error handling, edge cases, adversarial inputs
   - systems-auditor: concurrency, performance, resource management, observability
3. You SHALL minimize file overlap between workers. Each file SHALL be owned by one worker.

## Dispatch
You SHALL register yourself first, then spawn children:
```
mpcr reviewer register --target-ref <REF>
mpcr reviewer spawn-children --parent-id <YOUR_ID> --session-id <SID> --target-ref <REF> --count N
```

For each worker, you SHALL:
1. Run `mpcr protocol dispatch --role <ROLE>` to get the dispatch prompt.
2. Customize the prompt with the assigned file list and focus areas.
3. Launch the worker as a subagent (e.g., via the Task tool or equivalent).

You SHALL launch ALL workers as actual subagents. IF a subagent mechanism is not available,
you SHALL fall back to single-agent mode and perform the review yourself using `mpcr protocol reviewer`.

## Child lifecycle
WHEN you spawn children via mpcr but do NOT dispatch subagents for them, you SHALL
update each unused child: `mpcr reviewer update --reviewer-id <CHILD_ID> --status CANCELLED`.
You SHALL NOT leave children in INITIALIZING state.

## Synthesis
1. You SHALL wait for all worker subagents to return their Proof Packets.
2. You SHALL merge findings, deduplicate, and resolve conflicts (keep the higher severity).
3. You SHALL run `mpcr protocol report-template --scale standard` for the report skeleton.
4. You SHALL write the merged report and finalize:
   `mpcr reviewer finalize --verdict <V> --blocker N --major N --minor N --nit N --report-file <PATH>`

## Constraints
- You own the mpcr session. Workers SHALL NOT run mpcr commands.
- Workers are read-only: they SHALL NOT edit files.
- IF a worker finds nothing, that is valid. You SHALL NOT pad findings.
- You SHALL update phase status via `mpcr reviewer update --phase <PHASE>` at each transition.
"""

[domains]
title = "Universal Domains"
content = """
| # | Domain | Defend that... | Seed challenges |
|---|--------|---------------|-----------------|
| 1 | Architecture | design is justified, simple, consistent | over-abstraction, separation of concerns, simpler alternatives, idiomatic patterns |
| 2 | Contracts | consumers unbroken across upgrades/rollbacks | API surfaces, mixed-version compat, unknown fields, error format stability |
| 3 | Data integrity | data is never silently lost, corrupted, or reordered | write ordering, partial failure, migration reversibility, encoding round-trips |
| 4 | Error handling | every error path is reachable, tested, and safe | missing catches, swallowed errors, misleading messages, resource leaks on error |
| 5 | Security | no untrusted input reaches a privileged operation unvalidated | injection, auth bypass, SSRF, path traversal, timing leaks, secret exposure |
| 6 | Concurrency | shared state is correctly synchronized under all interleavings | data races, deadlock, starvation, atomicity violations, ordering assumptions |
| 7 | Performance | no regression under realistic and adversarial workloads | O(n^2) paths, unbounded allocations, missing pagination, cache invalidation |
| 8 | Observability | failures are diagnosable from logs/metrics/traces alone | silent failures, missing context in errors, log noise, metric cardinality |
| 9 | Testing | tests defend the contract, not the implementation | missing edge cases, brittle mocks, test-only code paths, coverage gaps |
| 10 | Documentation | docs match the code and cover all public surfaces | stale docs, missing examples, undocumented error codes, misleading comments |
| 11 | Dependencies | third-party risk is bounded and auditable | version pinning, license compliance, supply chain, transitive vulnerabilities |

You SHALL use these domains during the DOMAIN_COVERAGE phase. You SHALL classify each as In-scope, Out-of-scope, or Unknown.
"""
