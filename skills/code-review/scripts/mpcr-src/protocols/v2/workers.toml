[[policy]]
id = "review-composite"
version = "2026.03.08"
summary = "Single-worker direct review reference for static discovery or manual artifact work; reviewer/full-cycle route_decision.worker_plan still uses the full recursive reviewer roster."
must = ["produce child_findings or parent_review artifacts only", "cover baseline correctness", "cover staleness when required", "challenge each surviving claim end-to-end before escalation: prove the introducing condition and the downstream effect or closure path", "keep surviving findings repo-anchored and cite external sources in report.md", "cover ship readiness"]
must_not = ["replace a routed reviewer/full-cycle worker_plan with a local shortcut", "emit narrative-only output"]
inputs = ["route_decision", "surface_map", "selected module packs"]
outputs = ["child_findings"]
checks = ["keep scope bounded to routed surfaces", "record loaded_policy_refs", "compute fingerprints for findings", "surviving findings still prove both the introducing condition and the downstream effect or closure path"]
stop_when = ["child_findings artifact is finalized"]
escalate_when = ["new high-weight surface appears"]
anti_patterns = ["acting as an orchestrator", "skipping evidence fields"]
examples = ["Manual review-composite artifact scaffolding for a direct-review fallback."]
schema = ["worker_kind", "module_ids", "findings", "defended_checks", "residual_risks", "route_revision_refs"]

[[policy]]
id = "orchestrator-root"
version = "2026.03.08"
summary = "Root orchestration anchor for reviewer and full-cycle sessions; route, challenge, and synthesize without absorbing routed worker investigation."
must = ["keep the orchestrator thin", "treat the registered root reviewer as the orchestration anchor, not a substitute for routed workers", "spawn or reuse the current route_decision worker roster before expecting synthesis to complete", "use session-bound dispatch with the spawned worker reviewer_id for role-specific prompts", "challenge worker outputs and maintain session state instead of redoing sibling first-hand review"]
must_not = ["absorb sibling worker scope", "replace spawn-routed with ad hoc root-only review", "treat the root reviewer_id as the default session-bound prompt for every worker"]
inputs = ["route_decision", "session ledger", "spawned reviewer roster", "descendant reports and machine artifacts"]
outputs = ["orchestration state", "spawned worker roster", "synthesis handoff context"]
checks = ["required routed workers are materialized or intentionally skipped with evidence", "root dispatch stays session-aware and does not claim sibling module ownership", "worker-specific prompts use the spawned reviewer_id instead of the root anchor"]
stop_when = ["the routed reviewer roster is materialized and the orchestrator has handed off or synthesized through the proper worker flow"]
escalate_when = ["route_decision is missing or inconsistent with the current session", "required worker roles cannot be materialized from the persisted route"]
anti_patterns = ["dispatching the root anchor as if it were a domain reviewer", "using root-only review as a shortcut around the routed roster"]
examples = ["Bootstrap a fresh reviewer session: register the root anchor, spawn routed workers, then load dispatch prompts for the spawned reviewer IDs."]
schema = ["session_id", "target_ref", "reviewer_id", "role", "lineage", "loaded_policy_refs"]

[[policy]]
id = "apply-composite"
version = "2026.03.08"
summary = "Single-worker direct application that challenges evidence, records dispositions, and emits verification results."
must = ["challenge anchor, scenario, severity, hallucination, duplication, and downstream neutralization", "trace the introducing condition and the downstream effect or closure path before accepting a claim", "drive every routed finding to applied or categorical decline", "decline claims that lose repo anchors or cited report evidence", "emit application_result then verification_result"]
must_not = ["apply without disposition records", "skip verification-needed bookkeeping"]
inputs = ["parent_review", "selected module packs"]
outputs = ["application_result", "verification_result"]
checks = ["decline codes are categorical", "verification buckets are consistent", "accepted findings remain traceable to repo anchors and cited report evidence", "accepted findings still survive introduction-side and closure-side challenge after the current code is inspected end-to-end"]
stop_when = ["every routed finding has a categorical disposition and verification_result is finalized"]
escalate_when = ["evidence challenge fails"]
anti_patterns = ["unbounded patching", "narrative-only decline reasons"]
examples = ["Direct apply for one low-risk review report."]
schema = ["source_finding_ids", "dispositions", "verification_needed", "decline_codes"]

[[policy]]
id = "surface-mapper"
version = "2026.03.08"
summary = "Build the semantic surface map and determine whether staleness checks are required."
must = ["emit risk_surface_record values", "mark behavior-facing artifacts", "decide staleness_required deterministically", "flag when changed interfaces imply downstream docs or contract research"]
must_not = ["route by churn alone"]
inputs = ["changed_files", "public_interfaces", "behavior_facing_artifacts"]
outputs = ["surface_map"]
checks = ["surface weights match defaults", "suggested modules include always-on modules later", "behavior-facing interfaces trigger docs or contract follow-up when needed"]
stop_when = ["surface_map is emitted"]
escalate_when = ["new surface weight >= 4 appears"]
anti_patterns = ["classifying purely by file count"]
examples = ["Config and CLI help changes imply config-surface plus docs-staleness."]
schema = ["changed_files", "risk_surfaces", "suggested_modules", "staleness_required"]

[[policy]]
id = "invariant-challenger"
version = "2026.03.08"
summary = "Use theorem/disproof style checks for correctness, integrity, and concurrency concerns."
must = ["state the invariant", "attempt a counterexample", "emit defended or failed evidence"]
must_not = ["use rhetorical prose as evidence"]
inputs = ["surface_map", "module packs", "focus files"]
outputs = ["child_findings"]
checks = ["anchors are precise", "defended checks include attempted_counterexample"]
stop_when = ["targeted concern is covered"]
escalate_when = ["counterexample implies major or blocker"]
anti_patterns = ["unsupported severity inflation"]
examples = ["Persistence and data-integrity checks over migration code."]
schema = ["findings", "defended_checks", "residual_risks"]

[[policy]]
id = "exploit-tracer"
version = "2026.03.08"
summary = "Trace exploit paths across auth, privilege, and input-validation surfaces."
must = ["follow untrusted input to privileged operations", "state exploit scenario concretely"]
must_not = ["emit abstract security claims without path evidence"]
inputs = ["auth/access surfaces", "privilege boundaries", "input validation surfaces"]
outputs = ["child_findings"]
checks = ["scenario is reproducible", "severity is proportional"]
stop_when = ["security path coverage is complete"]
escalate_when = ["privilege or auth bypass is plausible"]
anti_patterns = ["security theater findings"]
examples = ["Input reaches shell invocation without validation."]
schema = ["findings", "surface_ids", "anchors", "recommendation"]

[[policy]]
id = "contract-comparer"
version = "2026.03.08"
summary = "Compare API, schema, CLI, config, and migration contracts for congruent behavior across versions."
must = ["compare before and after contracts", "inspect official API docs/specs and relevant PR contract notes when needed", "call out compatibility drift"]
must_not = ["treat implementation refactors as contract drift without evidence"]
inputs = ["public interfaces", "config surfaces", "migration surfaces"]
outputs = ["child_findings"]
checks = ["claim references a concrete contract element", "verification is actionable", "external contract sources are cited in report.md when used"]
stop_when = ["contract deltas are covered"]
escalate_when = ["compatibility break is unguarded"]
anti_patterns = ["naming-only complaints"]
examples = ["CLI help text changed but config key docs did not."]
schema = ["findings", "defended_checks"]

[[policy]]
id = "congruence-checker"
version = "2026.03.08"
summary = "Check congruence between behavior-facing code changes and docs, comments, examples, or operator guidance."
must = ["treat staleness as first-class", "check docs whenever behavior-facing evidence requires it", "inspect relevant PR text or linked behavior notes when they materially shape expectations"]
must_not = ["assume docs are irrelevant when code changes behavior"]
inputs = ["surface_map", "behavior-facing artifacts", "docs changes"]
outputs = ["child_findings"]
checks = ["behavior-facing mismatch is explicit", "reopen_eligible is set correctly"]
stop_when = ["staleness coverage is complete"]
escalate_when = ["behavior-facing staleness remains"]
anti_patterns = ["style-only docs feedback as reopen"]
examples = ["Example output no longer matches CLI behavior."]
schema = ["findings", "residual_risks"]

[[policy]]
id = "simplification-checker"
version = "2026.03.08"
summary = "Interrogate scope creep and overengineering when the route or revision indicates excess complexity."
must = ["justify scope-creep claims with concrete simplification paths"]
must_not = ["treat any abstraction as overengineering"]
inputs = ["changed_files", "scope signals"]
outputs = ["child_findings"]
checks = ["recommendation simplifies behavior or structure", "severity stays bounded"]
stop_when = ["scope-creep concerns are resolved"]
escalate_when = ["change scope meaningfully exceeds routed need"]
anti_patterns = ["taste-based style feedback"]
examples = ["Large helper framework added for one small feature."]
schema = ["findings", "residual_risks"]

[[policy]]
id = "release-risk-assessor"
version = "2026.03.08"
summary = "Assess ship readiness after concern-specific review is complete."
must = ["synthesize ship risk last", "record blocking items and verdict"]
must_not = ["duplicate lower-level findings as new evidence"]
inputs = ["child_findings", "route_decision", "coverage summary"]
outputs = ["parent_review"]
checks = ["blocking item counts match required_now", "ship_readiness is consistent", "blocking items remain traceable to anchors or cited supporting sources"]
stop_when = ["parent_review is emitted"]
escalate_when = ["blocking items remain"]
anti_patterns = ["rendered markdown as source of truth"]
examples = ["Migration risk blocks shipping until rollback plan exists."]
schema = ["final_verdict", "ship_readiness", "coverage_summary"]

[[policy]]
id = "domain-reviewer"
version = "2026.03.08"
summary = "Own one review domain, produce a full authored report, and persist machine findings without duplicating sibling scope."
must = ["own exactly the assigned module or delegated sub-scope", "write a full report.md even for no-findings or low-signal outcomes", "walk adjacent code, callers, tests, docs, and PR context when changed lines are insufficient", "prove each surviving claim along the local causal path: identify the upstream precondition that introduces it and the downstream sink, observable effect, or closure path that still survives later guards, normalization, rollback, dedupe, retries, or caller handling", "challenge findings for anchor quality, realism, duplication, actionability, and counterevidence before escalating them", "cite API docs, web sources, or PR evidence in report.md when they materially inform the claim", "either finalize child_findings or record a categorical no-finding outcome before stopping"]
must_not = ["re-run language research already provided by upstream workers", "re-open already-addressed or low-signal claims", "delegate the same investigation slice twice", "leave first-hand sibling exploration to the orchestrator"]
inputs = ["dispatch prompt", "route_decision", "focus surfaces", "module pack", "language research refs"]
outputs = ["report.md", "child_findings"]
checks = ["claimed_scope and delegated_scope stay disjoint", "surviving findings keep repo anchors and any external sources are cited in report.md", "surviving findings name both the enabling condition and the downstream effect or closure path", "counterevidence from later guards, normalization, rollback, dedupe, retries, or caller behavior is ruled out or documented before escalation", "defended non-findings are documented", "residual risks explain why work stops or escalates"]
stop_when = ["the assigned module has a complete report and finalized child_findings", "the assigned scope is out-of-scope or low-signal and that categorical outcome is documented"]
escalate_when = ["new evidence implies a different routed domain must be delegated", "a major or blocker finding survives challenge"]
anti_patterns = ["generic review prose without evidence", "stopping at a suspicious line without checking whether later code neutralizes the suspected issue", "duplicating sibling domain work", "delegating without first claiming parent scope"]
examples = ["Core-correctness reviewer traces a behavior change through callers and post-conditions, rejects a suspicion once downstream normalization closes it, and finalizes one major finding that still reaches a real sink."]
schema = ["module_ids", "focus_surfaces", "claimed_scope", "delegated_scope", "findings", "defended_checks", "residual_risks"]

[[policy]]
id = "language-detector"
version = "2026.03.08"
summary = "Identify the active implementation languages early so research workers can fetch targeted primary-source guidance once."
must = ["derive languages from changed files and relevant interfaces", "normalize languages to stable slugs", "flag when public-interface or PR context implies downstream docs or API research", "avoid speculative language guesses when evidence is absent"]
must_not = ["emit product findings in place of language classification", "trigger duplicate language research for the same language without new evidence"]
inputs = ["changed_files", "public_interfaces", "route_decision"]
outputs = ["language roster", "research handoff context"]
checks = ["every detected language has a concrete file or interface signal", "unknown files do not block known-language handoff"]
stop_when = ["the language roster is stable enough for research fan-out"]
escalate_when = ["the change cannot be safely reviewed without resolving an unknown generated or embedded language"]
anti_patterns = ["guessing frameworks from filenames alone"]
examples = ["Rust plus Markdown changes trigger rust research and docs-aware domain review."]
schema = ["language", "evidence_refs", "report.md"]

[[policy]]
id = "language-research"
version = "2026.03.08"
summary = "Fetch current primary-source docs, standards, and idioms for one language so downstream reviewers stop re-browsing the same material."
must = ["use primary sources first", "prefer official API docs/specs and standards over commentary", "capture the sources and key idioms in the authored report", "record stable URLs or section pointers for external sources", "limit research to guidance relevant to the changed language and routed domains"]
must_not = ["restate generic review doctrine instead of language-specific guidance", "repeat research already cached for the same language without a new need"]
inputs = ["language roster", "changed files", "module focus", "dispatch prompt"]
outputs = ["report.md", "language research refs"]
checks = ["sources are current and language-native", "guidance maps back to routed review concerns", "report.md records stable source citations when external docs were used"]
stop_when = ["downstream workers have enough language-specific guidance to proceed without re-browsing"]
escalate_when = ["no trustworthy primary source can be established for a critical language feature"]
anti_patterns = ["blogspam in place of standards docs", "unbounded multi-language browsing"]
examples = ["Python research captures relevant PEP guidance for typing and packaging changes."]
schema = ["language", "sources", "idioms", "report.md"]

[[policy]]
id = "final-synthesizer"
version = "2026.03.08"
summary = "Worker policy for the `final-synthesis` dispatch role: concatenate descendant reports, preserve recursive counts, and surface only challenged high-signal findings in the parent synthesis."
must = ["walk descendant reports in stable order", "preserve recursive counts from machine artifacts", "filter out low-signal, duplicate, non-actionable, and already-addressed claims", "keep only findings that still have repo anchors and cited supporting sources where external context mattered", "emit an explicit next action: stop, apply, or reopen"]
must_not = ["invent new evidence", "duplicate leaf findings as fresh discoveries", "reopen loops for weak or already-resolved items"]
inputs = ["descendant report.md files", "child machine artifacts", "session counters"]
outputs = ["final_report.md", "parent review synthesis"]
checks = ["final counts match descendant artifacts", "concatenation order is stable", "push-or-stop recommendation is evidence-backed", "surviving items remain traceable to descendant anchors or cited sources"]
stop_when = ["the final synthesis is internally consistent and the next action is explicit"]
escalate_when = ["a surviving blocker or major finding requires reopen"]
anti_patterns = ["summary-only synthesis without leaf reports", "recounting findings from prose instead of artifacts"]
examples = ["Final synthesis concatenates all domain reports, rejects duplicate follow-ups, and reopens only one blocker."]
schema = ["source_artifact_ids", "final_verdict", "coverage_summary", "report.md"]

[[policy]]
id = "applicator-worker"
version = "2026.03.08"
summary = "Apply accepted findings after evidence challenge and record structured dispositions."
must = ["record one disposition per finding", "challenge the introducing condition and the downstream effect or closure path before accepting a finding", "capture modified files", "carry verification-needed findings forward"]
must_not = ["mutate findings in place", "discard decline reasons"]
inputs = ["parent_review", "application plan"]
outputs = ["application_result"]
checks = ["verification_needed matches dispositions", "decline codes are categorical", "accepted items remain traceable to anchored reviewer evidence", "accepted items still survive later guards, normalization, rollback, dedupe, retries, or caller handling in the current code"]
stop_when = ["application_result is emitted"]
escalate_when = ["repro or anchor challenge fails"]
anti_patterns = ["bulk applied without references"]
examples = ["Apply two major findings and defer one follow-up."]
schema = ["dispositions", "modified_files", "verification_needed", "decline_codes"]

[[policy]]
id = "applicator-verifier"
version = "2026.03.08"
summary = "Verify applied findings and emit categorical verification outcomes plus residual risks."
must = ["emit yes/no/partial buckets", "re-check the introducing condition and the downstream effect or closure path against the post-change code and verification evidence", "record residual risks after verification"]
must_not = ["treat verification notes as optional for failed items"]
inputs = ["application_result", "verification evidence"]
outputs = ["verification_result"]
checks = ["item buckets match status values", "residual risks are confidence-scored", "finding_ids match application_result.verification_needed exactly", "verification notes preserve anchor traceability", "verified or failed items still reflect introduction-side and closure-side challenge after the current code is exercised"]
stop_when = ["verification_result is emitted"]
escalate_when = ["verification fails", "fix regression appears"]
anti_patterns = ["free-form verification prose without records"]
examples = ["One finding verified, one partially verified due missing migration test."]
schema = ["verified_items", "failed_items", "partial_items", "residual_risks"]
