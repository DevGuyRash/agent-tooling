Files: [ORCHESTRATOR FILLS IN]
Explorer context: [ORCHESTRATOR FILLS IN]

## Domain focus
Defend that: design is justified, simple, consistent, and idiomatic.
Seed challenges: over-abstraction, separation of concerns, simpler alternatives, idiomatic patterns, layering violations, unnecessary indirection, god objects.

