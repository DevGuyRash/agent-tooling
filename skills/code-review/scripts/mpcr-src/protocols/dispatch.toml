   c. **Premature framework** — plugin system, registry, or dynamic dispatch for ≤2 variants?
   d. **Config-driven complexity** — configuration knob with no known external setter?
   e. **Indirection depth >3** — does reaching the concrete implementation require traversing more than 3 layers?
4. Generate ≥ 2 must-prove theorems referencing concrete `file:line` locations.
5. Attempt concrete disproof for each theorem.
6. Produce findings or defended proofs.
7. WHEN relevant tests exist, you SHALL run them.

Severity mapping:
- **MINOR** — single smell test triggered in isolation.
- **MAJOR** — ≥2 smell tests co-occur on the same code path.

## Output format
