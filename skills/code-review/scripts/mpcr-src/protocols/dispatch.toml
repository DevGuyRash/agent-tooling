# Subagent dispatch prompt templates.
# The orchestrator customizes these with file lists and focus areas before dispatching.
# Content is served by `mpcr protocol dispatch --role <ROLE>`.
# Written in EARS format (SHALL/WHEN/IF/NOT) addressing the executor ("you").

# ── Common preamble included in every reviewer role ──────────────────────────
#
# Each reviewer role below includes its own WORKER preamble and output format.
# The orchestrator SHALL:
#   1. Run `mpcr protocol dispatch --role <ROLE>` to get the template.
#   2. Replace [ORCHESTRATOR FILLS IN] placeholders with assigned files, child IDs, and explorer context.
#   3. Launch the worker as a subagent.
#
# For dynamically-discovered domains not covered by a named profile, use `domain-specialist`.

# ─────────────────────────────────────────────────────────────────────────────
# REVIEWER PROFILES — one domain per agent
# ─────────────────────────────────────────────────────────────────────────────

[roles.architecture_critic]
title = "Architecture Critic"
content = """
You are a code review subagent. Your SOLE domain: **Architecture**.

## WORKER identity
MPCR_DISPATCH_ROLE=architecture-critic
MPCR_REVIEWER_ID=<CHILD_ID8>
MPCR_SESSION_ID=<SESSION_ID8>
MPCR_SESSION_DIR=<SESSION_DIR_PATH>
