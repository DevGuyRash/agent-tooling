interface:
  display_name: "Code Review"
  short_description: "Recursive machine-first code review, application, and full-cycle convergence with mpcr"
  default_prompt: "Use $code-review to route first with a fully specified `mpcr route --persist --mode <reviewer|applicator|full-cycle> --target-ref <ref-string> --execution-capability <single_process|bounded_helpers|parallel_subagents> --max-worker-count <n> --orchestrator-read-budget-lines <n> --orchestrator-read-budget-snippets <n>` invocation, preferring `parallel_subagents` whenever helpers are available. `target-ref` is an opaque session key: branch name, commit SHA, or literal `HEAD` are all valid as long as the exact same string is reused for that session. Keep the resolved `session_dir` and reuse the same exact `target-ref` string for that session. For a fresh isolated session, choose an unused canonical `.local/reports/code_reviews/YYYY-MM-DD` leaf with `--repo-root <path> --date <yyyy-mm-dd>` instead of relying on implicit repo/today defaults; if that date leaf already belongs to another target-ref, pick another date or clean it up before rerouting. Register the reviewer/full-cycle root anchor with `mpcr reviewer register --target-ref <same-exact-ref> --session-dir <persisted.session_dir>`, prefer `mpcr reviewer spawn-routed --parent-id <root-reviewer-id> --session-dir <persisted.session_dir>` to materialize the routed worker roster, and use `mpcr reviewer spawn-children` only for targeted manual replay. Use `mpcr protocol dispatch --role <role> --session-dir <path> [--reviewer-id <id>]` with the matching spawned worker ID rather than the root anchor for worker-specific prompts, and load `orchestrator-root` when coordinating helpers. Before a reviewer finding enters `parent_review` or an applicator edits code, run a very tight 3-voter legitimacy gate with only the finding/fingerprint/anchors/call-chain/minimal refs; only 2-of-3 legitimate votes proceed, and rejected items should be recorded with `mpcr reviewer note` or `mpcr applicator note`. Keep machine findings repo-anchored, record PR/API/web citations in worker `report.md` files instead of `findings[].anchors`, validate with hard and soft layers, use `mpcr session reports --recursive` for descendant report retrieval, `mpcr session artifacts` for flat artifact inventory, and `mpcr session cleanup --session-dir <path>` to discard stale canonical session leaves before reruns. Drive `mpcr reviewer`, `mpcr applicator`, `mpcr fullcycle`, and `mpcr session metrics` through the CLI."
