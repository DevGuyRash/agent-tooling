version: 1
domain: compose
strictness: balanced
rules:
  - id: AC-CMP-NOPORTS
    severity: warn
    action: forbid_key
    target: service.*
    key: ports
    rationale: Internal-only stacks should not publish host ports by default.
  - id: AC-CMP-PRIVILEGED
    severity: warn
    action: forbid_key
    target: service.*
    key: privileged
    rationale: Privileged containers are forbidden by default.
  - id: AC-CMP-READONLY
    severity: warn
    action: ensure_key
    target: service.*
    key: read_only
    value: true
    rationale: Immutable root filesystem by default.
  - id: AC-CMP-WRITABLE
    severity: warn
    action: ensure_writable_paths
    target: service.*
    rationale: Read-only root filesystem requires deterministic writable tmpfs and volume targets.
  - id: AC-CMP-CAPDROP
    severity: warn
    action: ensure_list_contains
    target: service.*
    key: cap_drop
    value: ALL
    rationale: Drop capabilities unless explicitly required.
  - id: AC-CMP-NNP
    severity: warn
    action: ensure_list_contains
    target: service.*
    key: security_opt
    value: no-new-privileges:true
    rationale: Prevent privilege escalation in runtime.
  - id: AC-CMP-SECRETS
    severity: warn
    action: require_sensitive_env_secrets
    target: service.*
    rationale: Prefer compose secrets for TOKEN/PASS/KEY variables instead of inline environment values.
  - id: AC-CMP-USER
    severity: warn
    action: require_non_root_user
    target: service.*
    key: user
    rationale: Non-root runtime posture for services.
  - id: AC-CMP-PERMS-INIT
    severity: warn
    action: ensure_volume_permissions
    target: service.*
    rationale: Non-root writable services require deterministic permission init sidecars.
  - id: AC-CMP-HEALTH
    severity: warn
    action: synthesize_healthcheck
    target: service.*
    rationale: Healthchecks should be synthesized from verified runtime facts and curated image knowledge.
  - id: AC-CMP-CAPS
    severity: warn
    action: ensure_capability_profile
    target: service.*
    rationale: Add back only justified capabilities and device reservations deterministically.
  - id: AC-CMP-RESOURCES
    severity: warn
    action: ensure_resource_limits
    target: service.*
    mode: compose
    value:
      memory: 512m
      cpus: "1.0"
      pids_limit: 256
    rationale: Compose mode requires explicit deterministic resource limits.
