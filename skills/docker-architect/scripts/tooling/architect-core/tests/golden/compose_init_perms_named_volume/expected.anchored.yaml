x-init-permissions-core: &init_permissions_core
  cap_add:
    - CHOWN
    - FOWNER
  cap_drop:
    - ALL
  network_mode: none
  read_only: true
  restart: no
  security_opt:
    - no-new-privileges:true
  user: 0:0
x-hardening-core: &hardening_core
  cap_drop:
    - ALL
  read_only: true
  security_opt:
    - no-new-privileges:true
x-resource-defaults-compose: &resource_defaults_compose
  cpus: '1.0'
  mem_limit: 512m
  pids_limit: 256
services:
  api:
    <<: [*hardening_core, *resource_defaults_compose]
    depends_on:
      api-init-perms:
        condition: service_completed_successfully
    healthcheck:
      interval: 10s
      retries: 3
      start_period: 10s
      test:
        - CMD
        - nginx
        - -t
      timeout: 5s
    image: nginx:1.27@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
    tmpfs:
      - /run:rw,noexec,nosuid,nodev,size=16m
      - /tmp:rw,noexec,nosuid,nodev,size=64m
      - /var/run:rw,noexec,nosuid,nodev,size=16m
    user: 101:101
    volumes:
      - app_data:/var/cache/app
  api-init-perms:
    <<: [*hardening_core, *init_permissions_core, *resource_defaults_compose]
    command:
      - /bin/sh
      - -euxc
      - set -eu; for path in /mnt/perm-0; do mkdir -p "$path"; owner="$(stat -c '%u:%g' "$path" 2>/dev/null || true)"; if [ "$owner" != "101:101" ]; then chown -R 101:101 "$path"; fi; done
    image: docker.io/library/alpine:3.20@sha256:a4f4213abb84c497377b8544c81b3564f313746700372ec4fe84653e4fb03805
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m
      - /run:rw,noexec,nosuid,nodev,size=16m
      - /var/run:rw,noexec,nosuid,nodev,size=16m
    volumes:
      - app_data:/mnt/perm-0
volumes:
  app_data: {}
