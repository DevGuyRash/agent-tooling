x-hardening-core: &hardening_core
  cap_drop:
    - ALL
  read_only: true
  security_opt:
    - no-new-privileges:true
x-resource-defaults-swarm: &resource_defaults_swarm
  deploy:
    resources:
      limits:
        cpus: '1.0'
        memory: 512m
services:
  api:
    <<: [*hardening_core, *resource_defaults_swarm]
    healthcheck:
      interval: 10s
      retries: 3
      start_period: 10s
      test:
        - CMD
        - nginx
        - -t
      timeout: 5s
    image: nginx:1.27@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
    tmpfs:
      - /run:rw,noexec,nosuid,nodev,size=16m
      - /tmp:rw,noexec,nosuid,nodev,size=64m
      - /var/run:rw,noexec,nosuid,nodev,size=16m
    user: 101:101
  worker:
    <<: [*hardening_core, *resource_defaults_swarm]
    healthcheck:
      interval: 10s
      retries: 5
      start_period: 10s
      test:
        - CMD
        - redis-cli
        - ping
      timeout: 5s
    image: redis:7.2@sha256:bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
    tmpfs:
      - /run:rw,noexec,nosuid,nodev,size=16m
      - /tmp:rw,noexec,nosuid,nodev,size=64m
      - /var/run:rw,noexec,nosuid,nodev,size=16m
    user: 999:999
