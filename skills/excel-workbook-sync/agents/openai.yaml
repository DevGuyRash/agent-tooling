interface:
  display_name: "Excel Workbook Sync"
  short_description: "Pull, compare, audit, and sync Excel workbook artifacts on safe copies or manifest workspaces"
  default_prompt: "Use $excel-workbook-sync when you need generic pull, compare, audit, or matrix-audit flows on copied Excel workbooks, or manifest-driven inspect/query/bootstrap/push/pull/roundtrip/refresh flows from a committed Excel sync workspace. Prefer copied-workbook audit by default. Treat Windows Excel COM as the only write-capable backend. Treat OOXML/package parsing as read-only and use it for package-readable `.xlsx`/`.xlsm` query, bootstrap, and pull coverage. Extract tables, names, conditional formatting, formulas, data-validation, protection, chart metadata, pivot metadata, Power Query metadata, and VBA metadata where supported, and use the payload `capabilities`, `warnings`, and `unsupported` fields instead of assuming a surface is available. When Excel cannot open a workbook for COM compare, preserve `comparisonAvailable: false` and use `comparisonStatus` plus diagnostics instead of inferring parity."
