interface:
  display_name: "Excel Foundry"
  short_description: "Workbook lifecycle, manifest doctoring, package-safe reads/writes, automation artifacts, and Excel sync across direct commands, safe copies, and manifest workspaces"
  default_prompt: "Use $excel-foundry when you need workbook lifecycle commands such as workbook inspect/capabilities/create/diff/save-as/convert/repair/compatibility/document-inspect, manifest validate/doctor/migrate, or direct workbook commands such as sheet list/create/delete, cell get/set, range get/set, name list/set/delete, table list/read/get/create/update/delete, query list/get/set/delete/refresh, connection list/get, chart/pivot/slicer/timeline commands, guarded model measure/relationship/hierarchy/kpi/perspective commands, or automation inspect/generate/run. Use it for generic pull/compare/audit/matrix-audit flows on copied Excel workbooks and for manifest-driven inspect/query/bootstrap/push/pull/roundtrip/refresh/plan/compare/sync flows from a committed Excel sync workspace. Treat Windows Excel COM as the live backend for `.xls`, `.xlsb`, conversion, refresh, Power Query/connection/pivot/model mutation, and other fidelity-sensitive operations. Use the package backend for package-readable `.xlsx`/`.xlsm` direct reads and safe edits, per-surface planning/compare, dry-run sync, workbook creation, and safe OOXML writes. Use automation `artifact-workbook` for Codex spreadsheet-runtime workbook builders. Run `workbook capabilities --deep` when choosing max-write routes. Read `capabilities`, `warnings`, `unsupported`, `engineRoutes`, and `capabilityLedger` before assuming a surface is available."
