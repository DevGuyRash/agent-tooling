interface:
  display_name: "Excel Foundry"
  short_description: "Workbook lifecycle, manifest doctoring, package-safe reads, and Excel artifact sync across direct commands, safe copies, and manifest workspaces"
  default_prompt: "Use $excel-foundry when you need workbook lifecycle commands such as workbook inspect, workbook capabilities, workbook create, workbook diff, or manifest validate/doctor/migrate, or when you need direct workbook commands such as sheet list/create, cell get/set, range get/set, name list/set/delete, table list/read/get/create/update/delete, query list/get/set/delete/refresh, connection list/get, or chart/pivot list/get. Use it for generic pull/compare/audit/matrix-audit flows on copied Excel workbooks and for manifest-driven inspect/query/bootstrap/push/pull/roundtrip/refresh/plan/compare/sync flows from a committed Excel sync workspace. Treat Windows Excel COM as the live backend for advanced live workbook mutation, `.xls`, `.xlsb`, conversion, refresh, and other fidelity-sensitive operations. Use the package backend for package-readable `.xlsx`/`.xlsm` direct workbook reads and safe edits, inspect/query/bootstrap, per-surface planning, per-surface compare, dry-run sync, workbook creation, and apply mode on the current safe OOXML write surfaces. Extract workbook metadata, sheets, tables, names, conditional formatting, formulas, data-validation, protection, dimensions, hyperlinks, comments, print settings, pivot metadata, Power Query metadata, and VBA/package metadata where supported, and use the payload `capabilities`, `warnings`, `unsupported`, and per-surface planning fields instead of assuming a surface is available."
