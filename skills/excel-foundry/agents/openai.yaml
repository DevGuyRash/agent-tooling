interface:
  display_name: "Excel Foundry"
  short_description: "Excel workbook capability router for package, desktop, cloud, automation, semantic-model, and manifest/artifact operations"
  default_prompt: "Use $excel-foundry when the user needs raw Excel workbook capabilities across package-readable files, installed desktop Excel, Graph workbook APIs, Office Scripts/Excel JS/Add-in hosts, Fabric/Power BI semantic models, DAX/TMDL/PBIP artifacts, or manifest/artifact synchronization. Treat SKILL.md as the top-level router: read only the reference selected by the user's intent first. Use `references/query.md` for direct `<resource> <action> [flags]` commands, `references/runtime-compatibility.md` for package vs desktop vs cloud vs semantic host selection, `references/protocol-audit.md` for arbitrary workbook inspect/pull/compare/audit/matrix-audit, `references/protocol-manifest-sync.md` only for manifest/artifact synchronization, and `references/output-contract.md` for JSON/report interpretation. Use `workbook capabilities --deep --documentation` and `references/excel-capability-matrix.json` when support level, backend lanes, closure reason, host requirements, secret handling, or documentation anchors matter. Do not invent SOPs, opinionated workbook procedures, or unsupported mutation paths; expose inventory, preservation, diagnostics, host/cloud plans, dry-runs, or explicit limitations when public mutation is not supported."
